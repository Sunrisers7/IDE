<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Python Master | Мобильный справочник</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0c10; color: #c9d1d9; line-height: 1.6; min-height: 100vh; }
        
        /* Header */
        .header { background: #161b22; padding: 12px 15px; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #58a6ff, #d2a8ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .menu-btn { background: none; border: none; color: #c9d1d9; font-size: 24px; cursor: pointer; padding: 5px 10px; display: none; }
        .progress-container { display: flex; align-items: center; gap: 8px; background: #0d1117; padding: 4px 10px; border-radius: 20px; border: 1px solid #30363d; }
        .progress-bar { width: 80px; height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #238636, #58a6ff); width: 0%; transition: width 0.4s; }
        .progress-text { color: #58a6ff; font-size: 11px; font-weight: 600; min-width: 35px; }
        
        /* Tab bar */
        .tab-bar { display: flex; background: #161b22; padding: 8px 10px; gap: 5px; border-bottom: 1px solid #30363d; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab { padding: 10px 16px; background: transparent; border: none; color: #8b949e; font-size: 14px; cursor: pointer; border-radius: 20px; transition: 0.2s; white-space: nowrap; font-weight: 500; flex-shrink: 0; }
        .tab:hover { background: #21262d; }
        .tab.active { background: #1f6feb; color: white; }
        
        /* Main layout */
        .main-container { display: flex; position: relative; }
        
        /* Sidebar - скрыта на мобильных, показывается по кнопке */
        .nav-sidebar { width: 100%; max-width: 320px; background: #161b22; border-right: 1px solid #30363d; overflow-y: auto; padding: 15px; position: fixed; top: 0; left: 0; bottom: 0; z-index: 200; transform: translateX(-100%); transition: transform 0.3s ease; }
        .nav-sidebar.open { transform: translateX(0); }
        .nav-sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #30363d; }
        .nav-sidebar-header h3 { color: #58a6ff; font-size: 18px; }
        .close-btn { background: none; border: none; color: #c9d1d9; font-size: 28px; cursor: pointer; padding: 5px 10px; }
        .nav-section { margin-bottom: 25px; }
        .nav-section h3 { color: #58a6ff; margin: 0 0 12px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item { padding: 12px 14px; color: #c9d1d9; text-decoration: none; display: flex; align-items: center; gap: 10px; border-radius: 8px; font-size: 15px; cursor: pointer; transition: 0.2s; margin-bottom: 3px; -webkit-tap-highlight-color: transparent; }
        .nav-item:active { background: #1f6feb; }
        .nav-item.completed::after { content: "✓"; margin-left: auto; color: #238636; font-weight: bold; }
        
        /* Overlay for mobile menu */
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 150; display: none; }
        .overlay.show { display: block; }
        
        /* Content area */
        .content-area { flex: 1; padding: 20px 15px; background: #0d1117; min-height: calc(100vh - 120px); }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .wiki-article h1 { color: #f0f6fc; font-size: 26px; margin-bottom: 15px; border-bottom: 2px solid #30363d; padding-bottom: 12px; }
        .wiki-article h2 { color: #f0f6fc; font-size: 22px; margin: 30px 0 15px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
        .wiki-article h3 { color: #d2a8ff; font-size: 18px; margin: 20px 0 12px; }
        .wiki-article p { margin-bottom: 15px; font-size: 15px; }
        .wiki-article code { background: #21262d; padding: 3px 8px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #a5d6ff; word-break: break-word; }
        
        /* Code blocks */
        .code-block { background: #0d1117; border: 1px solid #30363d; border-radius: 12px; margin: 20px 0; overflow: hidden; }
        .code-header { background: #21262d; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; flex-wrap: wrap; gap: 10px; }
        .code-title { color: #8b949e; font-size: 13px; font-weight: 600; }
        .copy-btn { background: #30363d; border: none; color: #c9d1d9; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; -webkit-tap-highlight-color: transparent; min-height: 40px; }
        .copy-btn:active { background: #1f6feb; }
        .code-content { padding: 15px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .code-content pre { margin: 0; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.5; color: #e6edf3; white-space: pre-wrap; word-break: break-word; }
        
        /* Syntax */
        .keyword { color: #ff7b72; }
        .string { color: #a5d6ff; }
        .comment { color: #8b949e; font-style: italic; }
        .function { color: #d2a8ff; }
        .number { color: #79c0ff; }
        .builtin { color: #ffa657; }
        
        /* Tables */
        .data-table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #0d1117; border-radius: 10px; overflow: hidden; border: 1px solid #30363d; font-size: 13px; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .data-table th { background: #21262d; color: #58a6ff; padding: 12px 10px; text-align: left; white-space: nowrap; }
        .data-table td { padding: 10px; border-bottom: 1px solid #30363d; }
        .data-table .command { font-family: 'JetBrains Mono', monospace; color: #79c0ff; }
        
        /* Info boxes */
        .info-box { background: #1a1f2a; border-left: 4px solid #58a6ff; padding: 15px; margin: 20px 0; border-radius: 0 10px 10px 0; }
        .info-box.warning { background: #1f1a1a; border-left-color: #f85149; }
        .info-box.success { background: #1a3320; border-left-color: #238636; }
        .info-box .title { font-weight: 700; font-size: 16px; margin-bottom: 8px; color: #f0f6fc; }
        
        /* Task cards */
        .task-card { background: #1a1f2a; border: 1px solid #30363d; border-radius: 16px; padding: 20px 15px; margin: 25px 0; border-left: 5px solid #58a6ff; }
        .task-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .task-title { color: #f0f6fc; font-size: 18px; font-weight: 700; }
        .difficulty { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .difficulty.easy { background: #238636; color: white; }
        .difficulty.medium { background: #9e6a03; color: white; }
        .difficulty.hard { background: #f85149; color: white; }
        .task-description { font-size: 14px; margin-bottom: 15px; }
        
        details { margin-top: 15px; }
        summary { cursor: pointer; color: #58a6ff; font-weight: 600; padding: 10px 0; -webkit-tap-highlight-color: transparent; }
        
        /* Grids */
        .lib-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin: 20px 0; }
        .lib-card { background: #0d1117; border: 1px solid #30363d; border-radius: 14px; padding: 18px; }
        .lib-card h4 { color: #58a6ff; font-size: 18px; margin-bottom: 8px; }
        .lib-card p { font-size: 14px; margin-bottom: 12px; color: #8b949e; }
        .lib-card .install-cmd { background: #21262d; padding: 8px 12px; border-radius: 8px; font-family: monospace; font-size: 12px; color: #a5d6ff; word-break: break-all; }
        
        .badge { background: #1f6feb; color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; margin-right: 8px; }
        
        /* Desktop styles */
        @media (min-width: 768px) {
            .menu-btn { display: none !important; }
            .nav-sidebar { position: static; transform: none !important; width: 300px; }
            .nav-sidebar-header { display: none; }
            .overlay { display: none !important; }
            .main-container { display: flex; }
            .lib-grid { grid-template-columns: repeat(2, 1fr); }
            .tab-bar { padding: 8px 20px; }
            .content-area { padding: 30px 40px; }
            .wiki-article h1 { font-size: 32px; }
            .code-content pre { font-size: 13px; }
            .data-table { font-size: 14px; display: table; }
        }
        
        @media (min-width: 1024px) {
            .lib-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<header class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="logo">🐍 Python Master</div>
    <div class="header-right">

    let viewedSections = JSON.parse(localStorage.getItem('pythonMasterViewed') || '[]');

    function toggleMenu() {
        document.getElementById('navSidebarContainer').classList.add('open');
        document.getElementById('overlay').classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closeMenu() {
        document.getElementById('navSidebarContainer').classList.remove('open');
        document.getElementById('overlay').classList.remove('show');
        document.body.style.overflow = '';
    }

    function renderNavSidebar() {
        let html = '';
        for (const [key, section] of Object.entries(navStructure)) {
            html += `<div class="nav-section"><h3>${section.title}</h3>`;
            section.items.forEach(id => {
                const info = courseContent[id] || { title: id };
                const completed = viewedSections.includes(id) ? 'completed' : '';
                html += `<div class="nav-item ${completed}" onclick="loadContent('${id}'); closeMenu();">${info.title}</div>`;
            });
            html += '</div>';
        }
        document.getElementById('navSidebar').innerHTML = html;
    }

    function renderTasks() {
        document.getElementById('tasks-content').innerHTML = `
            <div class="wiki-article">
                <h1>💪 Практические задания</h1>
                <div class="task-card">
                    <div class="task-header"><span class="task-title">📝 Калькулятор</span><span class="difficulty easy">Лёгкий</span></div>

                    <details><summary>📖 Показать решение</summary><div class="code-block" style="margin-top:15px;"><div class="code-content"><pre>a = float(input("Первое: "))
b = float(input("Второе: "))
op = input("Операция: ")
if op == "+": print(a + b)
elif op == "-": print(a - b)

    if b != 0: print(a / b)

    for i in range(1, 11): f.write(f"{i}\\n")

    for line in f: total += int(line)
print(total)</pre></div></div></details>
                </div>

                </div>
                <div class="task-card">
                    <div class="task-header"><span class="task-title">📷 Детектор лиц</span><span class="difficulty hard">Сложный</span></div>
                    <div class="task-description">OpenCV: веб-камера, детектор лиц, зелёная рамка.</div>
                    <details><summary>📖 Показать решение</summary><div class="code-block" style="margin-top:15px;"><div class="code-content"><pre>import cv2
fc = cv2.CascadeClassifier(cv2.data.haarcascades + 'haarcascade_frontalface_default.xml')
cap = cv2.VideoCapture(0)
while True:
    ret, frame = cap.read()
    gray = cv2.cvtColor(frame, cv2.COLOR_BGR2GRAY)
    faces = fc.detectMultiScale(gray, 1.1, 5)
    for (x,y,w,h) in faces: cv2.rectangle(frame, (x,y), (x+w,y+h), (0,255,0), 2)

    function loadContent(id) {
        if (!viewedSections.includes(id)) {
            viewedSections.push(id);
            localStorage.setItem('pythonMasterViewed', JSON.stringify(viewedSections));
            renderNavSidebar();
            updateProgress();
        }
        const info = courseContent[id] || { title: id, content: '<p>В разработке</p>' };
        document.getElementById('learn-content').innerHTML = `<div class="wiki-article"><h1>${info.title}</h1>${info.content}</div>`;
        switchTab('learn');
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
        document.getElementById(`${tab}-page`).classList.add('active');
        
        if (tab === 'tasks') renderTasks();
        else if (tab === 'github') renderGitHub();
    }

    function updateProgress() {
        const total = Object.keys(courseContent).length;
        const progress = Math.round((viewedSections.length / total) * 100);
        document.getElementById('progressFill').style.width = progress + '%';
        document.getElementById('progressText').textContent = progress + '%';
    }

    function copyCode(btn) {
        const code = btn.closest('.code-block').querySelector('pre').innerText;
        navigator.clipboard.writeText(code).then(() => {
            btn.textContent = '✅ Скопировано!';
            setTimeout(() => btn.textContent = '📋 Копировать', 2000);
        }).catch(() => {
            alert('Не удалось скопировать');
        });
    }

    // Инициализация
    renderNavSidebar();
    updateProgress();
    loadContent('print-input');
</script>
