<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Python Master | Энциклопедия</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0c10 0%, #0d1117 100%);
            color: #c9d1d9;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Анимированный фон */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(88, 166, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(210, 168, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(35, 134, 54, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Модальное окно выбора устройства */
        .device-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 12, 16, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .device-modal.hidden {
            display: none;
        }

        .device-card {
            background: linear-gradient(145deg, #161b22, #0d1117);
            border: 1px solid #30363d;
            border-radius: 32px;
            padding: 45px 35px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(88, 166, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .device-card h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #58a6ff, #d2a8ff, #58a6ff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .device-card p {
            color: #8b949e;
            margin-bottom: 35px;
            font-size: 17px;
        }

        .device-buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .device-btn {
            background: linear-gradient(145deg, #21262d, #1a1f2a);
            border: 2px solid #30363d;
            border-radius: 20px;
            padding: 22px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .device-btn:hover {
            border-color: #58a6ff;
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(88, 166, 255, 0.2);
        }

        .device-btn.selected {
            border-color: #58a6ff;
            background: linear-gradient(145deg, #1f2937, #111827);
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.3), inset 0 0 20px rgba(88, 166, 255, 0.1);
        }

        .device-icon {
            font-size: 56px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .device-info {
            text-align: left;
            flex: 1;
        }

        .device-info h3 {
            color: #f0f6fc;
            font-size: 22px;
            margin-bottom: 6px;
        }

        .device-info span {
            color: #8b949e;
            font-size: 14px;
        }

        .continue-btn {
            background: linear-gradient(135deg, #238636, #2ea043);
            border: none;
            border-radius: 16px;
            padding: 18px;
            color: white;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(35, 134, 54, 0.3);
        }

        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(35, 134, 54, 0.4);
        }

        .auto-detect {
            margin-top: 22px;
            color: #58a6ff;
            cursor: pointer;
            font-size: 15px;
            text-decoration: none;
            display: inline-block;
            padding: 8px 16px;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .auto-detect:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        /* Основной интерфейс */
        .app-container {
            display: none;
            position: relative;
            z-index: 1;
        }

        .app-container.visible {
            display: block;
        }

        /* Хедер */
        .header {
            background: linear-gradient(135deg, #161b22, #0d1117);
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-weight: 800;
            background: linear-gradient(135deg, #58a6ff, #d2a8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo::before {
            content: "🐍";
            -webkit-text-fill-color: initial;
            color: #58a6ff;
            font-size: 28px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .device-toggle {
            background: linear-gradient(145deg, #21262d, #1a1f2a);
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .device-toggle:hover {
            border-color: #58a6ff;
            background: linear-gradient(145deg, #1f2937, #111827);
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(13, 17, 23, 0.8);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid #30363d;
            backdrop-filter: blur(5px);
        }

        .progress-bar {
            width: 100px;
            height: 8px;
            background: #21262d;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #238636, #58a6ff, #d2a8ff);
            background-size: 200% 100%;
            width: 0%;
            transition: width 0.5s ease;
            animation: progressGlow 2s ease infinite;
        }

        @keyframes progressGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .progress-text {
            color: #58a6ff;
            font-size: 13px;
            font-weight: 700;
        }

        /* Табы */
        .tab-bar {
            display: flex;
            background: rgba(22, 27, 34, 0.9);
            gap: 8px;
            border-bottom: 1px solid #30363d;
            backdrop-filter: blur(10px);
            padding: 10px 20px;
        }

        .tab {
            background: transparent;
            border: none;
            color: #8b949e;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .tab::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #58a6ff, #d2a8ff);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }

        .tab:hover::before {
            opacity: 0.1;
        }

        .tab.active {
            background: linear-gradient(135deg, #1f6feb, #1a5bc2);
            color: white;
            box-shadow: 0 4px 15px rgba(31, 111, 235, 0.3);
        }

        /* Контент */
        .content-area {
            flex: 1;
            background: transparent;
            min-height: calc(100vh - 120px);
            position: relative;
        }

        .page {
            display: none;
            animation: pageFade 0.4s ease;
        }

        @keyframes pageFade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page.active {
            display: block;
        }

        /* Wiki стили */
        .wiki-article {
            max-width: 1200px;
            margin: 0 auto;
        }

        .wiki-article h1 {
            color: #f0f6fc;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid;
            border-image: linear-gradient(90deg, #58a6ff, #d2a8ff, transparent) 1;
            font-size: 34px;
            font-weight: 800;
            background: linear-gradient(135deg, #f0f6fc, #c9d1d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .wiki-article h2 {
            color: #f0f6fc;
            margin: 35px 0 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #30363d;
            font-size: 26px;
            font-weight: 700;
        }

        .wiki-article h3 {
            color: #d2a8ff;
            margin: 25px 0 15px;
            font-size: 20px;
            font-weight: 600;
        }

        /* Карточки библиотек */
        .lib-grid {
            display: grid;
            gap: 20px;
            margin: 30px 0;
        }

        .lib-card {
            background: linear-gradient(145deg, #161b22, #0d1117);
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .lib-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #58a6ff, #d2a8ff);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .lib-card:hover::before {
            transform: translateX(0);
        }

        .lib-card:hover {
            transform: translateY(-5px);
            border-color: #58a6ff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(88, 166, 255, 0.2);
        }

        .lib-card h4 {
            color: #58a6ff;
            font-size: 22px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lib-card p {
            color: #8b949e;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .lib-card .install-cmd {
            background: #21262d;
            padding: 12px 16px;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: #a5d6ff;
            border: 1px solid #30363d;
            font-size: 14px;
        }

        .lib-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #1f6feb, #6e40c9);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Блоки кода */
        .code-block {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 16px;
            margin: 25px 0;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .code-header {
            background: linear-gradient(135deg, #21262d, #1a1f2a);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }

        .code-title {
            color: #8b949e;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .copy-btn {
            background: linear-gradient(135deg, #30363d, #21262d);
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: linear-gradient(135deg, #1f6feb, #1a5bc2);
            border-color: #58a6ff;
        }

        .code-content {
            padding: 20px;
            overflow-x: auto;
        }

        .code-content pre {
            margin: 0;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            line-height: 1.6;
            color: #e6edf3;
        }

        /* Синтаксис */
        .keyword { color: #ff7b72; font-weight: 600; }
        .string { color: #a5d6ff; }
        .comment { color: #8b949e; font-style: italic; }
        .function { color: #d2a8ff; }
        .number { color: #79c0ff; }
        .builtin { color: #ffa657; }
        .decorator { color: #d2a8ff; }

        /* Таблицы */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
            background: #0d1117;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #30363d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .data-table th {
            background: linear-gradient(135deg, #21262d, #1a1f2a);
            color: #58a6ff;
            padding: 16px 18px;
            text-align: left;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .data-table td {
            padding: 14px 18px;
            border-bottom: 1px solid #30363d;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover {
            background: rgba(88, 166, 255, 0.05);
        }

        .data-table .command {
            font-family: 'JetBrains Mono', monospace;
            color: #79c0ff;
            font-weight: 500;
        }

        /* Бейджи */
        .badge {
            background: linear-gradient(135deg, #1f6feb, #6e40c9);
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 4px 10px rgba(31, 111, 235, 0.2);
        }

        .badge-new {
            background: linear-gradient(135deg, #f85149, #d2a8ff);
            color: white;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 700;
            margin-left: 8px;
            text-transform: uppercase;
        }

        /* Инфо боксы */
        .info-box {
            background: linear-gradient(145deg, #1a1f2a, #131820);
            border-left: 5px solid #58a6ff;
            padding: 20px 25px;
            margin: 30px 0;
            border-radius: 0 16px 16px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .info-box.warning {
            background: linear-gradient(145deg, #1f1a1a, #181313);
            border-left-color: #f85149;
        }

        .info-box.success {
            background: linear-gradient(145deg, #1a3320, #142818);
            border-left-color: #238636;
        }

        .info-box .title {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 10px;
            color: #f0f6fc;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Навигация */
        .nav-section {
            margin-bottom: 25px;
        }

        .nav-section h3 {
            color: #58a6ff;
            margin: 0 0 15px 0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding-left: 12px;
        }

        .nav-item {
            color: #c9d1d9;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            position: relative;
            overflow: hidden;
        }

        .nav-item::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(135deg, #58a6ff, #d2a8ff);
            transform: scaleY(0);
            transition: transform 0.2s;
        }

        .nav-item:hover::before {
            transform: scaleY(1);
        }

        .nav-item:hover {
            background: linear-gradient(90deg, rgba(88, 166, 255, 0.1), transparent);
            color: #f0f6fc;
        }

        .nav-item.completed::after {
            content: "✓";
            margin-left: auto;
            color: #238636;
            font-weight: bold;
            font-size: 16px;
        }

        /* Задания */
        .task-card {
            background: linear-gradient(145deg, #161b22, #0d1117);
            border: 1px solid #30363d;
            border-radius: 24px;
            padding: 30px;
            margin: 30px 0;
            border-left: 6px solid #58a6ff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .task-card:hover {
            border-left-width: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .task-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .task-title {
            color: #f0f6fc;
            font-weight: 700;
            font-size: 24px;
        }

        .difficulty {
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .difficulty.easy {
            background: linear-gradient(135deg, #238636, #2ea043);
            color: white;
            box-shadow: 0 4px 10px rgba(35, 134, 54, 0.3);
        }

        .difficulty.medium {
            background: linear-gradient(135deg, #9e6a03, #c47d00);
            color: white;
            box-shadow: 0 4px 10px rgba(158, 106, 3, 0.3);
        }

        .difficulty.hard {
            background: linear-gradient(135deg, #f85149, #da3633);
            color: white;
            box-shadow: 0 4px 10px rgba(248, 81, 73, 0.3);
        }

        details summary {
            cursor: pointer;
            color: #58a6ff;
            font-weight: 600;
            font-size: 16px;
            padding: 12px 0;
            transition: all 0.2s;
        }

        details summary:hover {
            color: #79c0ff;
        }

        /* Адаптация */
        body.phone-mode .header {
            padding: 12px 15px;
        }

        body.phone-mode .logo {
            font-size: 20px;
        }

        body.phone-mode .logo::before {
            font-size: 24px;
        }

        body.phone-mode .menu-btn {
            display: block;
            background: linear-gradient(135deg, #21262d, #1a1f2a);
            border: 1px solid #30363d;
            color: #c9d1d9;
            font-size: 24px;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 10px;
        }

        body.phone-mode .tab-bar {
            padding: 8px 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-wrap: nowrap;
        }

        body.phone-mode .tab-bar::-webkit-scrollbar {
            display: none;
        }

        body.phone-mode .tab {
            padding: 10px 18px;
            white-space: nowrap;
            flex-shrink: 0;
            font-size: 14px;
        }

        body.phone-mode .nav-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 100%;
            max-width: 320px;
            background: linear-gradient(145deg, #161b22, #0d1117);
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
            padding: 20px 15px;
            box-shadow: 5px 0 30px rgba(0,0,0,0.5);
        }

        body.phone-mode .nav-sidebar.open {
            transform: translateX(0);
        }

        body.phone-mode .nav-sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #30363d;
        }

        body.phone-mode .close-btn {
            background: none;
            border: none;
            color: #c9d1d9;
            font-size: 30px;
            cursor: pointer;
            padding: 5px 12px;
        }

        body.phone-mode .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 150;
            display: none;
        }

        body.phone-mode .overlay.show {
            display: block;
        }

        body.phone-mode .content-area {
            padding: 15px;
        }

        body.phone-mode .wiki-article h1 {
            font-size: 26px;
        }

        body.phone-mode .wiki-article h2 {
            font-size: 22px;
        }

        body.phone-mode .code-content pre {
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        body.phone-mode .data-table {
            font-size: 13px;
            display: block;
            overflow-x: auto;
        }

        body.phone-mode .lib-grid {
            grid-template-columns: 1fr;
        }

        body.phone-mode .task-card {
            padding: 20px 15px;
        }

        body.phone-mode .nav-item {
            padding: 15px 14px;
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
        }

        body.phone-mode .copy-btn {
            min-height: 44px;
            padding: 10px 18px;
        }

        /* ПК режим */
        body.pc-mode .header {
            padding: 14px 30px;
        }

        body.pc-mode .logo {
            font-size: 26px;
        }

        body.pc-mode .menu-btn {
            display: none;
        }

        body.pc-mode .tab-bar {
            padding: 10px 30px;
        }

        body.pc-mode .tab {
            padding: 10px 24px;
            font-size: 16px;
        }

        body.pc-mode .main-container {
            display: flex;
        }

        body.pc-mode .nav-sidebar {
            position: sticky;
            top: 70px;
            width: 320px;

            html += `<div class="nav-section"><h3>${section.title}</h3>`;
            section.items.forEach(id => {
                const info = courseContent[id] || { title: id };
                const completed = viewedSections.includes(id) ? 'completed' : '';
                html += `<div class="nav-item ${completed}" onclick="loadContent('${id}'); if(currentDevice==='phone')closeMenu();">${info.title}</div>`;
            });
            html += '</div>';
        }
        document.getElementById('navSidebar').innerHTML = html;
    }

    function loadContent(id) {
        if (!viewedSections.includes(id)) {
            viewedSections.push(id);
            localStorage.setItem('pythonMasterViewed', JSON.stringify(viewedSections));
            renderNavSidebar();
            updateProgress();
        }
        const info = courseContent[id] || { title: id, content: '<p>В разработке</p>' };
        document.getElementById('learn-content').innerHTML = `<div class="wiki-article"><h1>${info.title}</h1>${info.content}</div>`;
        switchTab('learn');
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
        document.getElementById(`${tab}-page`).classList.add('active');
        if (tab === 'tasks') renderTasks();
        else if (tab === 'github') renderGitHub();
    }

    function renderTasks() {
        document.getElementById('tasks-content').innerHTML = `
            <div class="wiki-article">
                <h1>💪 Практические задания</h1>
                <div class="task-card"><div class="task-header"><span class="task-title">📝 Калькулятор</span><span class="difficulty easy">Лёгкий</span></div><p>Калькулятор с +, -, *, /. Обработайте деление на ноль.</p><details><summary>📖 Решение</summary><div class="code-block"><div class="code-content"><pre>a=float(input("A:"));b=float(input("B:"));op=input("Op:")
if op=="+":print(a+b)
elif op=="-":print(a-b)
elif op=="*":print(a*b)
elif op=="/":print(a/b if b!=0 else "Ошибка")</pre></div></div></details></div>
                <div class="task-card"><div class="task-header"><span class="task-title">🔢 FizzBuzz</span><span class="difficulty easy">Лёгкий</span></div><p>1-100: /3=Fizz, /5=Buzz, /15=FizzBuzz</p><details><summary>📖 Решение</summary><div class="code-block"><div class="code-content"><pre>for i in range(1,101):
    if i%15==0:print("FizzBuzz")
    elif i%3==0:print("Fizz")
    elif i%5==0:print("Buzz")
    else:print(i)</pre></div></div></details></div>
            </div>`;
    }

    function renderGitHub() {
        document.getElementById('github-content').innerHTML = `
            <div class="wiki-article">
                <h1>🔗 GitHub и деплой</h1>
                <table class="data-table"><tr><th>Команда</th><th>Описание</th></tr>
                <tr><td class="command">git init</td><td>Инициализация</td></tr>
                <tr><td class="command">git add .</td><td>Добавить всё</td></tr>
                <tr><td class="command">git commit -m ""</td><td>Коммит</td></tr>
                <tr><td class="command">git push</td><td>Отправить</td></tr>
                <tr><td class="command">git pull</td><td>Получить</td></tr>
                <tr><td class="command">git clone URL</td><td>Клонировать</td></tr></table>
                <h2>🚀 Хостинги</h2>
                <div class="lib-grid">
                    <div class="lib-card"><h4>Render</h4><p>Автодеплой из GitHub</p><div class="install-cmd">render.com</div></div>
                    <div class="lib-card"><h4>Vercel</h4><p>Для Flask/FastAPI</p><div class="install-cmd">vercel.com</div></div>
                    <div class="lib-card"><h4>PythonAnywhere</h4><p>Бесплатный хостинг</p><div class="install-cmd">pythonanywhere.com</div></div>
                </div>
            </div>`;
    }

    function updateProgress() {
        const total = Object.keys(courseContent).length;
        const progress = Math.round((viewedSections.length / total) * 100);
        document.getElementById('progressFill').style.width = progress + '%';
        document.getElementById('progressText').textContent = progress + '%';
    }

    function copyCode(btn) {
        const code = btn.closest('.code-block').querySelector('pre').innerText;
        navigator.clipboard.writeText(code).then(() => {
            btn.textContent = '✅';
            setTimeout(() => btn.textContent = '📋', 1500);
        });
    }

    // Инициализация
    if (currentDevice) {
        applyDeviceMode(currentDevice);
        document.getElementById('deviceModal').classList.add('hidden');
        document.getElementById('appContainer').classList.add('visible');
        updateDeviceToggle();
        renderNavSidebar();
        updateProgress();
        loadContent('print-input');
    } else {
        document.getElementById('deviceModal').classList.remove('hidden');
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        selectDevice(isMobile ? 'phone' : 'pc');
        renderNavSidebar();
    }

    window.selectDevice = selectDevice;
    window.applyDevice = applyDevice;
    window.autoDetect = autoDetect;
    window.showDeviceModal = showDeviceModal;
    window.toggleMenu = toggleMenu;
    window.closeMenu = closeMenu;
    window.loadContent = loadContent;
    window.switchTab = switchTab;
    window.copyCode = copyCode;
</script>

</body>
</html>
